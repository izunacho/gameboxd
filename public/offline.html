<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0F0F0F" />
  <title>Offline — Gameboxd</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0F0F0F;
      color: #E0E0E0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 360px;
    }
    .icon {
      width: 88px;
      height: 88px;
      margin: 0 auto 24px;
      display: block;
      border-radius: 20px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #fff; }
    p { color: #9a9a9a; line-height: 1.5; margin-bottom: 24px; }
    button {
      background: #00D084;
      color: #000;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 10px;
      cursor: pointer;
    }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icon-192.png" alt="Gameboxd" class="icon" />
    <h1>You're offline</h1>
    <p>Gameboxd needs an internet connection to load games and reviews. Check your connection and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
